<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>DL — HelpDesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#0a0a0f;--cream:#faf8f4;--surface:#fff;--surface2:#f4f1ec;--red:#d4372a;--gold:#c8902a;--green:#2a8a4a;--border:rgba(10,10,15,0.1);--muted:rgba(10,10,15,0.42);--shadow:0 2px 12px rgba(10,10,15,0.07)}
    body{min-height:100vh;background:var(--cream);color:var(--ink);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;background-image:repeating-linear-gradient(0deg,transparent,transparent 25px,rgba(10,10,15,0.025) 25px,rgba(10,10,15,0.025) 26px)}

    .topbar{position:sticky;top:0;z-index:100;background:rgba(250,248,244,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--red),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:15px;color:#fff}
    .logo-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--ink)}
    .logo-name span{color:var(--gold)}
    .back-btn{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:0.8rem;font-weight:500;color:var(--ink);text-decoration:none;transition:all 0.2s}
    .back-btn:hover{background:var(--surface2)}

    main{flex:1;max-width:900px;width:100%;margin:0 auto;padding:44px 24px 80px}

    .hero{margin-bottom:40px;animation:up 0.6s cubic-bezier(0.22,1,0.36,1) both}
    @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(42,138,74,0.1);border:1px solid rgba(42,138,74,0.22);border-radius:20px;padding:3px 12px;margin-bottom:12px;font-size:0.7rem;font-weight:600;color:var(--green);letter-spacing:0.07em;text-transform:uppercase}
    .hero h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--ink);margin-bottom:8px}
    .hero p{font-size:0.85rem;color:var(--muted);line-height:1.7;font-weight:300;max-width:440px}

    .layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:flex-start}
    @media(max-width:768px){.layout{grid-template-columns:1fr}}

    /* Form */
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:var(--shadow);animation:up 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both}
    .form-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:22px}
    .field{margin-bottom:18px}
    label{display:block;font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
    input[type=text],input[type=email],select,textarea{
      width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;
      font-family:'Outfit',sans-serif;font-size:0.87rem;color:var(--ink);outline:none;
      transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none
    }
    input::placeholder,textarea::placeholder{color:var(--muted)}
    input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(42,138,74,0.1)}
    textarea{resize:vertical;min-height:100px;line-height:1.6}
    .priority-row{display:flex;gap:8px}
    .priority-opt{flex:1;cursor:pointer}
    .priority-opt input{display:none}
    .priority-opt span{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px solid var(--border);border-radius:9px;font-size:0.78rem;font-weight:500;color:var(--muted);transition:all 0.2s;background:var(--surface2)}
    .priority-opt input:checked+span{border-color:currentColor;background:rgba(0,0,0,0.03)}
    .priority-opt.low input:checked+span{color:var(--green);border-color:var(--green);background:rgba(42,138,74,0.07)}
    .priority-opt.med input:checked+span{color:var(--gold);border-color:var(--gold);background:rgba(200,144,42,0.07)}
    .priority-opt.high input:checked+span{color:var(--red);border-color:var(--red);background:rgba(212,55,42,0.07)}
    .submit-btn{width:100%;padding:13px;background:var(--ink);border:none;border-radius:10px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:600;color:#fff;transition:all 0.2s;box-shadow:0 4px 14px rgba(10,10,15,0.18)}
    .submit-btn:hover{background:#1c1c28;transform:translateY(-1px)}
    .submit-btn:active{transform:translateY(0)}

    /* Tickets */
    .tickets-col{animation:up 0.6s 0.18s cubic-bezier(0.22,1,0.36,1) both}
    .tickets-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
    .tickets-title span{font-family:'Outfit',sans-serif;font-size:0.7rem;color:var(--muted);font-weight:400}
    .ticket{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:default;transition:border-color 0.2s}
    .ticket:hover{border-color:rgba(10,10,15,0.18)}
    .ticket-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
    .ticket-id{font-size:0.65rem;color:var(--muted);font-weight:500}
    .ticket-cat{font-size:0.65rem;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
    .ticket-msg{font-size:0.8rem;color:var(--ink);line-height:1.5;margin-bottom:8px}
    .ticket-foot{display:flex;align-items:center;justify-content:space-between}
    .ticket-date{font-size:0.65rem;color:var(--muted)}
    .status{font-size:0.65rem;font-weight:600;padding:3px 9px;border-radius:20px}
    .status.open{background:rgba(42,138,74,0.1);color:var(--green);border:1px solid rgba(42,138,74,0.2)}
    .status.pending{background:rgba(200,144,42,0.1);color:var(--gold);border:1px solid rgba(200,144,42,0.2)}
    .status.closed{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
    .no-tickets{text-align:center;padding:32px;color:var(--muted);font-size:0.85rem}

    /* Success */
    .success-msg{display:none;background:rgba(42,138,74,0.08);border:1px solid rgba(42,138,74,0.22);border-radius:10px;padding:12px 16px;color:var(--green);font-size:0.82rem;margin-bottom:18px;font-weight:500}
    .success-msg.show{display:block;animation:up 0.3s ease}

    footer{background:var(--ink);color:rgba(255,255,255,0.45);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;font-size:0.75rem}
    footer strong{color:#fff;font-family:'Cormorant Garamond',serif;font-size:0.9rem}
  </style>
</head>
<body>
<script>if(localStorage.getItem('isLoggedIn')!=='true'){window.location.href='Login_Page.html'}</script>

<header class="topbar">
  <a class="logo" href="#"><div class="logo-mark">D</div><div class="logo-name">D<span>L</span></div></a>
  <a class="back-btn" href="DL_Homepage.html">← Back to Home</a>
</header>

<main>
  <div class="hero">
    <div class="hero-tag">🎧 HelpDesk</div>
    <h1>How can we help?</h1>
    <p>Submit a support ticket and our team will get back to you as soon as possible.</p>
  </div>

  <div class="layout">
    <!-- Form -->
    <div class="form-card">
      <div class="form-title">Submit a Ticket</div>
      <div class="success-msg" id="successMsg">✅ Ticket submitted successfully! We'll respond within 24 hours.</div>

      <div class="field">
        <label>Your Name</label>
        <input type="text" id="hName" placeholder="Full name"/>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="hEmail" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="hCat">
          <option value="">Select a category…</option>
          <option>📚 Digital Library</option>
          <option>📓 NoteBook</option>
          <option>🔐 Login / Account</option>
          <option>📢 Complaint</option>
          <option>💻 Technical Issue</option>
          <option>❓ General Query</option>
        </select>
      </div>
      <div class="field">
        <label>Priority</label>
        <div class="priority-row">
          <label class="priority-opt low"><input type="radio" name="priority" value="Low" checked/><span>🟢 Low</span></label>
          <label class="priority-opt med"><input type="radio" name="priority" value="Medium"/><span>🟡 Medium</span></label>
          <label class="priority-opt high"><input type="radio" name="priority" value="High"/><span>🔴 High</span></label>
        </div>
      </div>
      <div class="field">
        <label>Message</label>
        <textarea id="hMsg" placeholder="Describe your issue in detail…"></textarea>
      </div>
      <button class="submit-btn" onclick="submitTicket()">Submit Ticket →</button>
    </div>

    <!-- Tickets list -->
    <div class="tickets-col">
      <div class="tickets-title">My Tickets <span id="ticketCount">0 tickets</span></div>
      <div id="ticketsList"><div class="no-tickets">No tickets yet.<br/>Submit your first one!</div></div>
    </div>
  </div>
</main>

<footer>
  <strong>DL</strong>
  <span>© 2025 HelpDesk</span>
</footer>

<script>
  // Pre-fill from localStorage
  const userName = localStorage.getItem('userName') || '';
  const userEmail = localStorage.getItem('userEmail') || '';
  if(userName) document.getElementById('hName').value = userName;
  if(userEmail) document.getElementById('hEmail').value = userEmail;

  let tickets = JSON.parse(localStorage.getItem('ptom_tickets')||'[]');

  function renderTickets(){
    const list = document.getElementById('ticketsList');
    document.getElementById('ticketCount').textContent = `${tickets.length} ticket${tickets.length!==1?'s':''}`;
    if(tickets.length===0){list.innerHTML='<div class="no-tickets">No tickets yet.<br/>Submit your first one!</div>';return}
    list.innerHTML = tickets.slice().reverse().map(t=>`
      <div class="ticket">
        <div class="ticket-head">
          <span class="ticket-id">#${t.id}</span>
          <span class="ticket-cat">${t.cat||'General'}</span>
        </div>
        <div class="ticket-msg">${t.msg}</div>
        <div class="ticket-foot">
          <span class="ticket-date">${t.date} · ${t.priority} priority</span>
          <span class="status ${t.status}">${t.status.charAt(0).toUpperCase()+t.status.slice(1)}</span>
        </div>
      </div>`).join('');
  }

  function submitTicket(){
    const name = document.getElementById('hName').value.trim();
    const email = document.getElementById('hEmail').value.trim();
    const cat   = document.getElementById('hCat').value;
    const msg   = document.getElementById('hMsg').value.trim();
    const priority = document.querySelector('input[name=priority]:checked').value;

    if(!name||!email||!cat||!msg){alert('Please fill in all fields.');return}

    const ticket = {
      id: 'T'+(1000+tickets.length+1),
      name, email, cat, msg, priority,
      date: new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}),
      status: 'open'
    };
    tickets.push(ticket);
    localStorage.setItem('ptom_tickets', JSON.stringify(tickets));

    document.getElementById('hCat').value='';
    document.getElementById('hMsg').value='';
    document.querySelector('input[name=priority]').checked=true;

    const s = document.getElementById('successMsg');
    s.classList.add('show');
    setTimeout(()=>s.classList.remove('show'),4000);
    renderTickets();
  }

  renderTickets();
</script>
</body>
</html>
