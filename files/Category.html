<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PTOM — Categories</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#0a0a0f;--cream:#faf8f4;--surface:#fff;--surface2:#f4f1ec;--red:#d4372a;--gold:#c8902a;--border:rgba(10,10,15,0.1);--muted:rgba(10,10,15,0.42);--shadow:0 2px 12px rgba(10,10,15,0.07)}
    body{min-height:100vh;background:var(--cream);color:var(--ink);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;background-image:repeating-linear-gradient(0deg,transparent,transparent 25px,rgba(10,10,15,0.025) 25px,rgba(10,10,15,0.025) 26px)}

    .topbar{position:sticky;top:0;z-index:100;background:rgba(250,248,244,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--red),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:15px;color:#fff}
    .logo-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--ink)}
    .logo-name span{color:var(--gold)}
    .back-btn{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:0.8rem;font-weight:500;color:var(--ink);text-decoration:none;transition:all 0.2s}
    .back-btn:hover{background:var(--surface2)}

    main{flex:1;max-width:1080px;width:100%;margin:0 auto;padding:44px 24px 80px}

    .hero{margin-bottom:40px;animation:up 0.6s cubic-bezier(0.22,1,0.36,1) both}
    @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(200,144,42,0.1);border:1px solid rgba(200,144,42,0.22);border-radius:20px;padding:3px 12px;margin-bottom:12px;font-size:0.7rem;font-weight:600;color:var(--gold);letter-spacing:0.07em;text-transform:uppercase}
    .hero h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--ink);margin-bottom:8px}
    .hero p{font-size:0.85rem;color:var(--muted);line-height:1.7;font-weight:300;max-width:440px}

    /* Search */
    .search-wrap{position:relative;margin-bottom:36px;animation:up 0.6s 0.08s cubic-bezier(0.22,1,0.36,1) both}
    .search-wrap span{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--muted)}
    .search-wrap input{width:100%;padding:14px 16px 14px 44px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-family:'Outfit',sans-serif;font-size:0.87rem;color:var(--ink);outline:none;box-shadow:var(--shadow);transition:border-color 0.2s}
    .search-wrap input:focus{border-color:rgba(10,10,15,0.2)}
    .search-wrap input::placeholder{color:var(--muted)}

    /* Filter tabs */
    .filter-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:30px;animation:up 0.6s 0.14s cubic-bezier(0.22,1,0.36,1) both}
    .tab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.78rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s}
    .tab:hover{border-color:rgba(10,10,15,0.2);color:var(--ink)}
    .tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

    /* Category sections */
    .cat-section{margin-bottom:40px;animation:up 0.6s cubic-bezier(0.22,1,0.36,1) both}
    .sec-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .sec-head h2{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--ink);white-space:nowrap;display:flex;align-items:center;gap:8px}
    .sec-line{flex:1;height:1px;background:var(--border)}

    .resources{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

    .resource-card{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;
      box-shadow:var(--shadow);cursor:pointer;
      transition:transform 0.2s cubic-bezier(0.22,1,0.36,1),border-color 0.2s,box-shadow 0.2s;
      display:flex;align-items:flex-start;gap:12px;
    }
    .resource-card:hover{transform:translateY(-3px);border-color:rgba(10,10,15,0.18);box-shadow:0 8px 24px rgba(10,10,15,0.09)}
    .res-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:var(--surface2)}
    .res-body{flex:1;min-width:0}
    .res-title{font-size:0.85rem;font-weight:600;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .res-meta{font-size:0.7rem;color:var(--muted)}
    .res-badge{display:inline-flex;align-items:center;font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:5px}
    .badge-pdf{background:rgba(212,55,42,0.1);color:var(--red);border:1px solid rgba(212,55,42,0.18)}
    .badge-video{background:rgba(42,100,200,0.1);color:#2a64c8;border:1px solid rgba(42,100,200,0.18)}
    .badge-note{background:rgba(42,138,74,0.1);color:#2a8a4a;border:1px solid rgba(42,138,74,0.2)}
    .badge-quiz{background:rgba(200,144,42,0.1);color:var(--gold);border:1px solid rgba(200,144,42,0.2)}

    .no-results{text-align:center;padding:48px;color:var(--muted);font-size:0.9rem}

    footer{background:var(--ink);color:rgba(255,255,255,0.45);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;font-size:0.75rem}
    footer strong{color:#fff;font-family:'Cormorant Garamond',serif;font-size:0.9rem}

    @media(max-width:600px){main{padding:28px 14px 70px}.topbar{padding:0 16px;height:58px}}
  </style>
</head>
<body>
<script>if(localStorage.getItem('isLoggedIn')!=='true'){window.location.href='Login_Page.html'}</script>

<header class="topbar">
  <a class="logo" href="#"><div class="logo-mark">P</div><div class="logo-name">PTO<span>M</span></div></a>
  <a class="back-btn" href="ptomhomepage.html">← Back to Home</a>
</header>

<main>
  <div class="hero">
    <div class="hero-tag">🗂️ Categories</div>
    <h1>Browse All Resources</h1>
    <p>Explore books, videos, notes, and quizzes organized by subject and category.</p>
  </div>

  <div class="search-wrap">
    <span>🔍</span>
    <input type="text" id="searchQ" placeholder="Search resources, subjects, topics…" oninput="filterAll()"/>
  </div>

  <div class="filter-tabs" id="tabs">
    <div class="tab active" onclick="setFilter('All',this)">All</div>
    <div class="tab" onclick="setFilter('Mathematics',this)">📐 Mathematics</div>
    <div class="tab" onclick="setFilter('Science',this)">🔬 Science</div>
    <div class="tab" onclick="setFilter('English',this)">📝 English</div>
    <div class="tab" onclick="setFilter('History',this)">🏛️ History</div>
    <div class="tab" onclick="setFilter('Geography',this)">🌍 Geography</div>
    <div class="tab" onclick="setFilter('Computer',this)">💻 Computer</div>
    <div class="tab" onclick="setFilter('Hindi',this)">🇮🇳 Hindi</div>
  </div>

  <div id="content"></div>
</main>  

<footer>
  <strong>PTOM™</strong>
  <span>© 2025 Resource Library</span>
</footer>

<script>
const DATA = [
  {cat:'Mathematics',icon:'🔢',items:[
    {title:'NCERT Maths Class 10',meta:'Class 10 · 334 pages',badge:'pdf',color:'badge-pdf'},
    {title:'Algebra Fundamentals',meta:'Class 8–10 · Notes',badge:'note',color:'badge-note'},
    {title:'Trigonometry Guide',meta:'Class 10–12 · PDF',badge:'pdf',color:'badge-pdf'},
    {title:'Maths Practice Quiz',meta:'Class 9 · 50 questions',badge:'quiz',color:'badge-quiz'},
    {title:'Calculus Introduction',meta:'Class 12 · Video series',badge:'video',color:'badge-video'},
    {title:'Statistics & Probability',meta:'Class 11–12 · PDF',badge:'pdf',color:'badge-pdf'},
  ]},
  {cat:'Science',icon:'🔬',items:[
    {title:'Physics NCERT Class 11',meta:'Class 11 · 436 pages',badge:'pdf',color:'badge-pdf'},
    {title:'Chemistry Reactions',meta:'Class 10 · Video',badge:'video',color:'badge-video'},
    {title:'Biology Cell Division',meta:'Class 11 · Notes',badge:'note',color:'badge-note'},
    {title:'Science Quiz – Chapter 5',meta:'Class 9 · 30 questions',badge:'quiz',color:'badge-quiz'},
    {title:'Periodic Table Guide',meta:'All Classes · Reference',badge:'pdf',color:'badge-pdf'},
    {title:'Physics Numericals',meta:'Class 12 · Practice',badge:'note',color:'badge-note'},
  ]},
  {cat:'English',icon:'📝',items:[
    {title:'First Flight – Class 10',meta:'Class 10 · Textbook',badge:'pdf',color:'badge-pdf'},
    {title:'Grammar Workbook',meta:'Class 6–8 · Exercises',badge:'note',color:'badge-note'},
    {title:'Essay Writing Guide',meta:'Class 9–12 · Notes',badge:'note',color:'badge-note'},
    {title:'Literature Quiz',meta:'Class 10 · 40 questions',badge:'quiz',color:'badge-quiz'},
    {title:'English Speaking Practice',meta:'All Levels · Video',badge:'video',color:'badge-video'},
  ]},
  {cat:'History',icon:'🏛️',items:[
    {title:'India After Independence',meta:'Class 12 · Chapter notes',badge:'note',color:'badge-note'},
    {title:'Ancient History NCERT',meta:'Class 6 · Textbook',badge:'pdf',color:'badge-pdf'},
    {title:'World Wars Summary',meta:'Class 10 · Notes',badge:'note',color:'badge-note'},
    {title:'History MCQ Quiz',meta:'Class 12 · 60 questions',badge:'quiz',color:'badge-quiz'},
  ]},
  {cat:'Geography',icon:'🌍',items:[
    {title:'Physical Geography India',meta:'Class 11 · NCERT',badge:'pdf',color:'badge-pdf'},
    {title:'Map Skills Workbook',meta:'Class 9 · Practice',badge:'note',color:'badge-note'},
    {title:'Climate of India',meta:'Class 9 · Video lecture',badge:'video',color:'badge-video'},
    {title:'Geography Quiz',meta:'Class 10 · 35 questions',badge:'quiz',color:'badge-quiz'},
  ]},
  {cat:'Computer',icon:'💻',items:[
    {title:'Python for Beginners',meta:'Class 11–12 · PDF',badge:'pdf',color:'badge-pdf'},
    {title:'HTML & CSS Basics',meta:'Class 10–12 · Notes',badge:'note',color:'badge-note'},
    {title:'Computer Networks Video',meta:'Class 12 · Video',badge:'video',color:'badge-video'},
    {title:'IT Quiz – Networking',meta:'Class 12 · 45 questions',badge:'quiz',color:'badge-quiz'},
    {title:'Database SQL Guide',meta:'Class 12 · Reference',badge:'pdf',color:'badge-pdf'},
  ]},
  {cat:'Hindi',icon:'🇮🇳',items:[
    {title:'Kshitij Bhag 2',meta:'Class 10 · Textbook',badge:'pdf',color:'badge-pdf'},
    {title:'Hindi Vyakaran Notes',meta:'Class 8–10 · Notes',badge:'note',color:'badge-note'},
    {title:'Kabir Ke Dohe',meta:'Class 8 · Literature',badge:'pdf',color:'badge-pdf'},
    {title:'Hindi Nibandh Guide',meta:'All Classes · Essay',badge:'note',color:'badge-note'},
  ]},
];

let activeFilter = 'All';

function setFilter(f, el){
  activeFilter = f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterAll(){ render(); }

function render(){
  const q = (document.getElementById('searchQ').value||'').toLowerCase();
  const container = document.getElementById('content');

  let sections = DATA;
  if(activeFilter !== 'All') sections = DATA.filter(d=>d.cat===activeFilter);

  let html = '';
  let totalShown = 0;

  sections.forEach((sec,si)=>{
    const filtered = sec.items.filter(item =>
      !q || item.title.toLowerCase().includes(q) || item.meta.toLowerCase().includes(q) || sec.cat.toLowerCase().includes(q)
    );
    if(filtered.length===0) return;
    totalShown += filtered.length;
    html += `<div class="cat-section" style="animation-delay:${0.15+si*0.07}s">
      <div class="sec-head"><h2>${sec.icon} ${sec.cat}</h2><div class="sec-line"></div></div>
      <div class="resources">
        ${filtered.map(item=>`
          <div class="resource-card" onclick="alert('📖 Opening: ${item.title}\\n\\nThis resource will be available soon.')">
            <div class="res-icon">${sec.icon}</div>
            <div class="res-body">
              <div class="res-title">${item.title}</div>
              <div class="res-meta">${item.meta}</div>
              <span class="res-badge ${item.color}">${item.badge.toUpperCase()}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  });

  if(totalShown===0){
    html='<div class="no-results">🔍 No resources found for "<strong>'+q+'</strong>"</div>';
  }

  container.innerHTML = html;
}

render();
</script>
</body>
</html>
