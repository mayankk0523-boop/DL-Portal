<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PTOM — Digital Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#0a0a0f;--cream:#faf8f4;--surface:#fff;--surface2:#f4f1ec;--red:#d4372a;--gold:#c8902a;--border:rgba(10,10,15,0.1);--muted:rgba(10,10,15,0.42);--shadow:0 2px 12px rgba(10,10,15,0.07)}
    body{min-height:100vh;background:var(--cream);color:var(--ink);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;background-image:repeating-linear-gradient(0deg,transparent,transparent 25px,rgba(10,10,15,0.025) 25px,rgba(10,10,15,0.025) 26px)}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:100;background:rgba(250,248,244,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--red),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:15px;color:#fff;box-shadow:0 3px 10px rgba(212,55,42,0.35)}
    .logo-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--ink)}
    .logo-name span{color:var(--gold)}
    .back-btn{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:0.8rem;font-weight:500;color:var(--ink);text-decoration:none;transition:border-color 0.2s,background 0.2s}
    .back-btn:hover{border-color:rgba(10,10,15,0.2);background:var(--surface2)}

    main{flex:1;max-width:1000px;width:100%;margin:0 auto;padding:44px 24px 80px}

    /* Hero */
    .hero{margin-bottom:40px;animation:up 0.6s cubic-bezier(0.22,1,0.36,1) both}
    @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(200,144,42,0.1);border:1px solid rgba(200,144,42,0.22);border-radius:20px;padding:3px 12px;margin-bottom:12px;font-size:0.7rem;font-weight:600;color:var(--gold);letter-spacing:0.07em;text-transform:uppercase}
    .hero h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--ink);line-height:1.1;margin-bottom:8px}
    .hero p{font-size:0.85rem;color:var(--muted);line-height:1.7;font-weight:300;max-width:440px}

    /* Search */
    .search-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0 16px;margin-bottom:36px;box-shadow:var(--shadow);animation:up 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both}
    .search-bar span{font-size:1rem;color:var(--muted)}
    .search-bar input{flex:1;border:none;outline:none;background:transparent;font-family:'Outfit',sans-serif;font-size:0.87rem;color:var(--ink);padding:14px 0}
    .search-bar input::placeholder{color:var(--muted)}

    /* Section head */
    .sec-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;animation:up 0.6s 0.18s cubic-bezier(0.22,1,0.36,1) both}
    .sec-head h2{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--ink);white-space:nowrap}
    .sec-line{flex:1;height:1px;background:var(--border)}

    /* Class grid */
    .classes{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}

    .class-card{
      background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:24px 18px;text-decoration:none;color:var(--ink);
      display:flex;flex-direction:column;align-items:flex-start;gap:12px;
      box-shadow:var(--shadow);
      transition:transform 0.25s cubic-bezier(0.22,1,0.36,1),border-color 0.25s,box-shadow 0.25s;
      animation:up 0.55s cubic-bezier(0.22,1,0.36,1) both;
      cursor:pointer;position:relative;overflow:hidden;
    }
    .class-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold));opacity:0;transition:opacity 0.3s}
    .class-card:hover{transform:translateY(-5px);border-color:rgba(10,10,15,0.18);box-shadow:0 12px 32px rgba(10,10,15,0.1)}
    .class-card:hover::before{opacity:1}
    .class-card:nth-child(1){animation-delay:0.22s}.class-card:nth-child(2){animation-delay:0.27s}.class-card:nth-child(3){animation-delay:0.32s}.class-card:nth-child(4){animation-delay:0.37s}.class-card:nth-child(5){animation-delay:0.42s}.class-card:nth-child(6){animation-delay:0.47s}.class-card:nth-child(7){animation-delay:0.52s}.class-card:nth-child(8){animation-delay:0.57s}.class-card:nth-child(9){animation-delay:0.62s}.class-card:nth-child(10){animation-delay:0.67s}.class-card:nth-child(11){animation-delay:0.72s}.class-card:nth-child(12){animation-delay:0.77s}

    .class-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--red);line-height:1}
    .class-lbl{font-size:0.8rem;font-weight:600;color:var(--ink)}
    .class-sub{font-size:0.68rem;color:var(--muted);font-weight:300}
    .class-arr{align-self:flex-end;font-size:0.75rem;color:var(--muted);transition:color 0.2s,transform 0.2s}
    .class-card:hover .class-arr{color:var(--red);transform:translate(2px,-2px)}

    /* Subject modal overlay */
    .overlay{position:fixed;inset:0;background:rgba(10,10,15,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
    .overlay.open{display:flex;animation:fadeIn 0.25s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--surface);border-radius:20px;padding:32px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;animation:modalIn 0.3s cubic-bezier(0.22,1,0.36,1)}
    @keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--ink)}
    .modal-close{background:none;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .modal-close:hover{background:var(--surface2);color:var(--ink)}
    .subjects{display:flex;flex-direction:column;gap:10px}
    .subject-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;cursor:pointer;transition:border-color 0.2s,background 0.2s}
    .subject-row:hover{border-color:var(--red);background:#fff}
    .subject-name{font-size:0.87rem;font-weight:500;color:var(--ink)}
    .subject-icon{font-size:1rem}
    .coming-soon{font-size:0.7rem;color:var(--muted);background:var(--surface2);border-radius:6px;padding:2px 8px;border:1px solid var(--border)}

    footer{background:var(--ink);color:rgba(255,255,255,0.45);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;font-size:0.75rem}
    footer strong{color:#fff;font-family:'Cormorant Garamond',serif;font-size:0.9rem}

    @media(max-width:600px){
      .topbar{padding:0 16px;height:58px}
      .classes{grid-template-columns:repeat(3,1fr)}
      main{padding:28px 14px 70px}
    }
  </style>
</head>
<body>
<script>if(localStorage.getItem('isLoggedIn')!=='true'){window.location.href='Login_Page.html'}</script>

<header class="topbar">
  <a class="logo" href="#"><div class="logo-mark">P</div><div class="logo-name">PTO<span>M</span></div></a>
  <a class="back-btn" href="ptomhomepage.html">← Back to Home</a>
</header>

<main>
  <div class="hero">
    <div class="hero-tag">📚 Digital Library</div>
    <h1>Select Your Class</h1>
    <p>Choose your class to access books, notes, past papers, and study materials.</p>
  </div>

  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInp" placeholder="Search for a class or subject…" oninput="filterCards()"/>
  </div>

  <div class="sec-head"><h2>Classes</h2><div class="sec-line"></div></div>

  <div class="classes" id="classGrid">
    <!-- generated by JS -->
  </div>
</main>

<footer>
  <strong>PTOM™</strong>
  <span>© 2025 Digital Library</span>
</footer>

<!-- Subject Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">Class 1</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="subjects" id="subjectList"></div>
  </div>
</div>

<script>
  const SUBJECTS = {
    primary: ['Mathematics','English','Hindi','Environmental Science','General Knowledge','Art & Craft'],
    middle:  ['Mathematics','Science','English','Hindi','Social Studies','Sanskrit','Computer Science'],
    high:    ['Mathematics','Science','English','Hindi','Social Studies','Sanskrit','Computer Science','Physical Education'],
    senior:  ['Physics','Chemistry','Biology','Mathematics','English','Computer Science','Physical Education','Economics','Accountancy','Business Studies','History','Geography','Political Science']
  };

  const ICONS = {'Mathematics':'🔢','Science':'🔬','English':'📝','Hindi':'🇮🇳','Environmental Science':'🌿','General Knowledge':'🌍','Art & Craft':'🎨','Social Studies':'🗺️','Sanskrit':'📜','Computer Science':'💻','Physical Education':'⚽','Physics':'⚛️','Chemistry':'🧪','Biology':'🧬','Economics':'📊','Accountancy':'🧾','Business Studies':'💼','History':'🏛️','Geography':'🌐','Political Science':'⚖️'};

  function getSubjects(cls){
    if(cls<=5) return SUBJECTS.primary;
    if(cls<=8) return SUBJECTS.middle;
    if(cls<=10) return SUBJECTS.high;
    return SUBJECTS.senior;
  }

  const grid = document.getElementById('classGrid');

  for(let i=1;i<=12;i++){
    const card = document.createElement('div');
    card.className='class-card';
    card.dataset.class=i;
    card.innerHTML=`
      <div class="class-num">${i}</div>
      <div class="class-lbl">Class ${i}</div>
      <div class="class-sub">${getSubjects(i).length} subjects</div>
      <div class="class-arr">→</div>`;
    card.onclick=()=>openModal(i);
    grid.appendChild(card);
  }

  function openModal(cls){
    document.getElementById('modalTitle').textContent=`Class ${cls} — Subjects`;
    const subs=getSubjects(cls);
    const list=document.getElementById('subjectList');
    list.innerHTML=subs.map(s=>`
      <div class="subject-row" onclick="alert('📖 ${s} materials for Class ${cls} coming soon!')">
        <span class="subject-name">${ICONS[s]||'📚'} ${s}</span>
        <span class="coming-soon">View →</span>
      </div>`).join('');
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow='hidden';
  }

  function closeModal(e){
    if(!e||e.target===document.getElementById('overlay')){
      document.getElementById('overlay').classList.remove('open');
      document.body.style.overflow='';
    }
  }

  function filterCards(){
    const q=document.getElementById('searchInp').value.toLowerCase();
    document.querySelectorAll('.class-card').forEach(c=>{
      c.style.display=c.textContent.toLowerCase().includes(q)?'':'none';
    });
  }

  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
</script>
</body>
</html>
